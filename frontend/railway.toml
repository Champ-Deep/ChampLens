# Railway config for the ChampLens Frontend service.
# In the Railway dashboard, set this service's Root Directory to: frontend
# Also set Build Arg: VITE_API_URL=https://<your-api-service>.up.railway.app

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
startCommand = "sh -c 'serve -s dist -l ${PORT:-5173} --config /app/serve.json'"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
