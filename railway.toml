# Railway config for the ChampLens API service (Fastify backend).
# This is the root config — used when the Railway service has no Root Directory set.
# Reference: https://docs.railway.com/config-as-code/reference

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Run API server and card-processing worker in the same container.
# Both share the same uploads volume, MongoDB, and Redis connections.
startCommand = "sh -c 'PORT=${PORT:-3001} node dist/server.js & node dist/workers/index.js & wait'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
